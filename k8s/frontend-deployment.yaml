apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: label
spec:
 replicas: 1
 selector:
   matchLabels:
     app: frontend
 template:
   metadata:
     labels:
       app: frontend
   spec:
    containers:
    - name: frontend-cont
      image: yashdubey455/frontend:5
      imagePullPolicy: Never

      ports: 
       - containerPort: 5173
      resources:
        limits:
          memory: "512Mi"
          cpu: "500m"
        requests:
          memory: "256Mi"
          cpu: "250m"
      livenessProbe:
        httpGet:
         path: /
         port: 5173
        initialDelaySeconds: 30
        periodSeconds: 10
      readinessProbe:
        httpGet:
         path: /
         port: 5173
        initialDelaySeconds: 30
        periodSeconds: 10

---

apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: label
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
   - port: 5173
     targetPort: 5173
     nodePort: 30008
  
    